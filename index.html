<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .card { background: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        h2 { color: #1a73e8; text-align: center; font-size: 20px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #555; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔗 Adicionar Novo Grupo</h2>
    <form id="linkForm">
        <label>Curso:</label>
        <input type="text" name="curso" placeholder="Ex: Administração" required>
        
        <label>Disciplina:</label>
        <input type="text" name="disciplina" placeholder="Ex: Cálculo I" required>
        
        <label>Semestre:</label>
        <select name="semestre">
            <option>1º Semestre</option>
            <option>2º Semestre</option>
            <option>3º Semestre</option>
            <option>4º Semestre</option>
            <option>5º Semestre</option>
            <option>6º Semestre</option>
            <option>7º Semestre</option>
            <option>8º Semestre</option>
        </select>
        
        <label>Link do Grupo:</label>
        <input type="url" name="link" placeholder="Cole o link do WhatsApp/Telegram aqui" required>
        
        <button type="submit" id="btn">Enviar Link</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // COLE O SEU LINK ABAIXO ENTRE AS ASPAS:
    const scriptURL = 'COLE_AQUI_SEU_LINK_DO_APP_DA_WEB'; 
    
    const form = document.getElementById('linkForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando...";
        status.style.color = "orange";
        status.innerText = "Processando...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                status.style.color = "green";
                status.innerText = "✅ Sucesso! O link foi salvo na planilha.";
                form.reset();
                btn.disabled = false;
                btn.innerText = "Enviar Link";
            })
            .catch(error => {
                status.style.color = "red";
                status.innerText = "❌ Erro ao enviar. Tente novamente.";
                btn.disabled = false;
                btn.innerText = "Tentar novamente";
            });
    });
</script>

</body>
</html>
